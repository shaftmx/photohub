services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8
    ports: ["3306:3306"]
    environment:
      MYSQL_DATABASE: photohub
      MYSQL_USER: photohub
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: changeme  # change in production
    network_mode: bridge
    healthcheck:
      test: "mysqladmin ping -uroot -p$$MYSQL_ROOT_PASSWORD"
      timeout: 2s
      interval: 2s
      retries: 30
    volumes:
      - "/your/path/db:/var/lib/mysql"  # persist MySQL data

  # ── Web (Django + nginx) ────────────────────────────────────────────────────
  web:
    image: shaftmx/photohub
    links: [db]  # name resolution on default bridge network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/app-config"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "8000:80"
    environment:
      NGINX_MAX_UPLOAD_SIZE: "10240m"
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: admin   # change in production
      DJANGO_SUPERUSER_EMAIL: admin@admin.admin
      # Generate a secret key: python3 -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
      DJANGO_SECRET_KEY: 'django-insecure-51=qtuhifsb)&!!gdps^rkn2^re7_#nqp62pcq7fi^d*015+)6'  # change in production
      DJANGO_URL: https://mysite.fr     # public URL — used for CSRF validation; change to your domain
      HEADER_ALLOW_ORIGIN: "mysite.fr"  # Access-Control-Allow-Origin; change to your domain
      DB_NAME: photohub
      DB_HOST: db
      DB_USER: photohub
      DB_PASSWORD: secret
    network_mode: bridge
    volumes:
      - "/your/path/photos:/data"   # persist photos and thumbnails
      - "/your/path/dumps:/dumps"   # persist export/import dumps

  # ── Worker (video transcoding) ──────────────────────────────────────────────
  # Optional — only needed if ALLOW_VIDEO_UPLOAD is enabled.
  # Shares the same image and media volume as web.
  worker:
    image: shaftmx/photohub
    links: [db]
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    cpus: "1.0"  # limit CPU usage (e.g. 0.5 = half a core, 2.0 = 2 cores)
    command: python /photohub/manage.py transcode_pending
    environment:
      DJANGO_SECRET_KEY: 'django-insecure-51=qtuhifsb)&!!gdps^rkn2^re7_#nqp62pcq7fi^d*015+)6'  # must match web's DJANGO_SECRET_KEY
      DB_NAME: photohub
      DB_HOST: db
      DB_USER: photohub
      DB_PASSWORD: secret
      LOG_LEVEL: INFO
    network_mode: bridge
    volumes:
      - "/your/path/photos:/data"   # must match web's media volume
