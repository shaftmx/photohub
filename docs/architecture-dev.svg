<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="950" font-family="monospace" font-size="13">

  <!-- Styles -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>

  <!-- Browser -->
  <rect x="520" y="20" width="160" height="50" rx="6" fill="#e8f4fd" stroke="#2196F3" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" font-weight="bold" fill="#1565C0">Browser</text>

  <!-- Arrow: Browser -> nginx dev -->
  <line x1="600" y1="70" x2="600" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="610" y="108" fill="#777" font-size="11">:8080</text>

  <!-- nginx dev proxy -->
  <rect x="300" y="130" width="600" height="80" rx="6" fill="#fff8e1" stroke="#FFA000" stroke-width="2"/>
  <text x="600" y="155" text-anchor="middle" font-weight="bold" fill="#E65100">nginx (dev proxy)</text>
  <text x="600" y="173" text-anchor="middle" fill="#777" font-size="11">./dev/nginx-template/</text>
  <text x="390" y="196" fill="#555" font-size="11">/  →  web-vue:3000</text>
  <text x="620" y="196" fill="#555" font-size="11">/api, /static  →  web:80</text>

  <!-- Arrow: nginx -> web-vue -->
  <line x1="420" y1="210" x2="220" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: nginx -> web -->
  <line x1="700" y1="210" x2="820" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- web-vue container -->
  <rect x="60" y="290" width="300" height="200" rx="6" fill="#f3e5f5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="210" y="315" text-anchor="middle" font-weight="bold" fill="#4A148C">web-vue</text>
  <text x="210" y="335" text-anchor="middle" fill="#555" font-size="11">node:alpine  :3000</text>
  <text x="210" y="355" text-anchor="middle" fill="#555" font-size="11">yarn dev --host</text>
  <line x1="80" y1="368" x2="340" y2="368" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <text x="210" y="385" text-anchor="middle" fill="#555" font-size="11">vol: ./photohub-vuetify-src/</text>
  <text x="210" y="401" text-anchor="middle" fill="#777" font-size="11">src/  (views, components, stores)</text>
  <text x="210" y="417" text-anchor="middle" fill="#777" font-size="11">vite.config.js  package.json</text>
  <text x="210" y="435" text-anchor="middle" fill="#777" font-size="11">serves directly on :3000 (HMR)</text>
  <text x="210" y="455" text-anchor="middle" fill="#777" font-size="11">no build, no shared vol needed</text>

  <!-- web container (outer) -->
  <rect x="590" y="290" width="560" height="370" rx="6" fill="#e8f5e9" stroke="#388E3C" stroke-width="2"/>
  <text x="870" y="315" text-anchor="middle" font-weight="bold" fill="#1B5E20">web container</text>

  <!-- nginx internal (inside web) -->
  <rect x="615" y="330" width="510" height="170" rx="4" fill="#fff" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="870" y="352" text-anchor="middle" font-weight="bold" fill="#2E7D32">nginx (internal :80)</text>
  <line x1="630" y1="360" x2="1110" y2="360" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <text x="630" y="380" fill="#aaa" font-size="11">  /                  →  /photohub-vuetify/  (unused in dev)</text>
  <text x="630" y="398" fill="#555" font-size="11">  /static/*          →  /data/static/  (media files)</text>
  <text x="630" y="416" fill="#555" font-size="11">  /static/cache/*      →  /data/static/cache/  (thumbnails)</text>
  <text x="630" y="434" fill="#777" font-size="11">      (sample missing) →  /api/resample  (auto regen on the fly)</text>
  <text x="630" y="452" fill="#555" font-size="11">  /api/*             →  Django :5000</text>
  <text x="630" y="470" fill="#aaa" font-size="11">  /static/admin/*    →  Django admin static  (legacy, unused)</text>

  <!-- Arrow: nginx internal -> Django -->
  <line x1="870" y1="500" x2="870" y2="545" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Django (inside web) -->
  <rect x="615" y="545" width="510" height="95" rx="4" fill="#fff" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="870" y="567" text-anchor="middle" font-weight="bold" fill="#2E7D32">Django (gunicorn :5000)</text>
  <line x1="630" y1="575" x2="1110" y2="575" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <text x="630" y="595" fill="#555" font-size="11">  vol: ./photohub/           (source — hot reload)</text>
  <text x="630" y="613" fill="#555" font-size="11">  vol: /tmp/data/photos:/data (raw originals + thumbnails)</text>
  <text x="630" y="631" fill="#555" font-size="11">  vol: ./dumps:/dumps         (export / import)</text>

  <!-- Arrow: web -> db -->
  <line x1="870" y1="660" x2="870" y2="730" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- db -->
  <rect x="680" y="730" width="380" height="100" rx="6" fill="#fce4ec" stroke="#C62828" stroke-width="2"/>
  <text x="870" y="755" text-anchor="middle" font-weight="bold" fill="#B71C1C">db — MySQL 8  :3306</text>
  <line x1="695" y1="763" x2="1045" y2="763" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <text x="700" y="783" fill="#555" font-size="11">  vol: /tmp/data/db        (MySQL data)</text>
  <text x="700" y="801" fill="#555" font-size="11">  vol: ./db-init/           (initial SQL on first start)</text>

  <!-- Arrow: worker -> db -->
  <line x1="380" y1="800" x2="680" y2="800" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- worker -->
  <rect x="60" y="730" width="320" height="130" rx="6" fill="#e3f2fd" stroke="#1565C0" stroke-width="2"/>
  <text x="220" y="755" text-anchor="middle" font-weight="bold" fill="#0D47A1">worker</text>
  <line x1="75" y1="763" x2="365" y2="763" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <text x="75" y="783" fill="#555" font-size="11">  manage.py transcode_pending</text>
  <text x="75" y="801" fill="#777" font-size="11">  (daemon loop)</text>
  <text x="75" y="821" fill="#555" font-size="11">  vol: ./photohub/          (hot reload)</text>
  <text x="75" y="839" fill="#555" font-size="11">  vol: /tmp/data/photos     (shared w/ web)</text>

  <!-- Arrow: worker shared media vol (dashed) -->
  <line x1="380" y1="821" x2="590" y2="621" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="440" y="740" fill="#1565C0" font-size="11">shared media vol</text>

</svg>
