<svg width="1400" height="780" viewBox="0 0 1400 780" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">

  <defs>
    <marker id="ar"        markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#555"/></marker>
    <marker id="ar-red"    markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#E53935"/></marker>
    <marker id="ar-green"  markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#2E7D32"/></marker>
    <marker id="ar-orange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#E65100"/></marker>
  </defs>

  <rect width="1400" height="780" fill="#F7F8FA"/>

  <!-- Title -->
  <rect width="1400" height="44" fill="#1E2A3A"/>
  <text x="700" y="27" text-anchor="middle" font-size="16" font-weight="700" fill="white" letter-spacing="0.5">PhotoHub — Refactoring Tags : 3 composants → 1 composant</text>

  <!-- ══════════ LEFT: AVANT ══════════ -->
  <rect x="8" y="52" width="430" height="718" rx="10" fill="#FFF8F8" stroke="#FFCDD2" stroke-width="2"/>
  <text x="223" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#B71C1C" letter-spacing="1">AVANT  (3 composants)</text>

  <!-- TagFilter -->
  <rect x="18" y="84" width="192" height="130" rx="6" fill="#FFE0B2" stroke="#E53935" stroke-dasharray="5,3" stroke-width="2"/>
  <text x="114" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#C62828">TagFilter.vue ⚠</text>
  <line x1="30" y1="108" x2="200" y2="108" stroke="#E65100" stroke-width="1" opacity="0.4"/>
  <text x="114" y="122" text-anchor="middle" font-size="10" fill="#BF360C">modelValue: [tagObj]</text>
  <text x="114" y="136" text-anchor="middle" font-size="10" fill="#BF360C">filtre selon photos</text>
  <text x="114" y="150" text-anchor="middle" font-size="10" fill="#BF360C">rendu chips + combobox</text>
  <text x="114" y="164" text-anchor="middle" font-size="10" fill="#BF360C">return-object sur chip</text>
  <text x="114" y="200" text-anchor="middle" font-size="10" fill="#388E3C">→ FilterBar</text>

  <!-- TagGroupsEditor -->
  <rect x="224" y="84" width="205" height="130" rx="6" fill="#FFE0B2" stroke="#E53935" stroke-dasharray="5,3" stroke-width="2"/>
  <text x="326" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#C62828">TagGroupsEditor.vue ⚠</text>
  <line x1="236" y1="108" x2="420" y2="108" stroke="#E65100" stroke-width="1" opacity="0.4"/>
  <text x="326" y="122" text-anchor="middle" font-size="10" fill="#BF360C">modelValue: [tagName]</text>
  <text x="326" y="136" text-anchor="middle" font-size="10" fill="#BF360C">tous les tags DB</text>
  <text x="326" y="150" text-anchor="middle" font-size="10" fill="#BF360C">rendu chips + combobox</text>
  <text x="326" y="164" text-anchor="middle" font-size="10" fill="#BF360C">value="tag.name" sur chip</text>
  <text x="326" y="200" text-anchor="middle" font-size="10" fill="#388E3C">→ TagPhotos, EditTagsDialog, Admin</text>

  <!-- Duplication callout -->
  <rect x="18" y="226" width="410" height="30" rx="5" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
  <text x="223" y="238" text-anchor="middle" font-size="10" font-weight="700" fill="#C62828">⚠  Template chips + combobox identique dans les deux</text>
  <text x="223" y="251" text-anchor="middle" font-size="10" fill="#C62828">formats incompatibles  →  conversions implicites dispersées</text>

  <!-- Usage boxes avant -->
  <text x="26" y="278" font-size="10" font-weight="700" fill="#888" letter-spacing="0.8">CONSOMMATEURS</text>
  <line x1="26" y1="282" x2="428" y2="282" stroke="#DDD" stroke-width="1"/>

  <rect x="18" y="290" width="192" height="72" rx="5" fill="white" stroke="#90CAF9" stroke-width="1.5"/>
  <text x="114" y="307" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">FilterBar.vue</text>
  <text x="114" y="321" text-anchor="middle" font-size="10" fill="#555">→ TagFilter</text>
  <text x="114" y="335" text-anchor="middle" font-size="10" fill="#555">Photos, ViewCreate</text>

  <rect x="224" y="290" width="205" height="72" rx="5" fill="white" stroke="#90CAF9" stroke-width="1.5"/>
  <text x="326" y="307" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">TagPhotos.vue</text>
  <text x="326" y="321" text-anchor="middle" font-size="10" fill="#555">→ TagGroupsEditor</text>
  <text x="326" y="335" text-anchor="middle" font-size="10" fill="#555">Photos, Unpub, ViewCreate</text>

  <rect x="18" y="374" width="192" height="58" rx="5" fill="white" stroke="#90CAF9" stroke-width="1.5"/>
  <text x="114" y="391" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">EditTagsDialog.vue</text>
  <text x="114" y="405" text-anchor="middle" font-size="10" fill="#555">→ TagGroupsEditor</text>
  <text x="114" y="419" text-anchor="middle" font-size="10" fill="#555">depuis PhotoDetailPanel</text>

  <rect x="224" y="374" width="205" height="58" rx="5" fill="white" stroke="#90CAF9" stroke-width="1.5"/>
  <text x="326" y="391" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">Admin.vue</text>
  <text x="326" y="405" text-anchor="middle" font-size="10" fill="#555">→ TagGroupsEditor</text>
  <text x="326" y="419" text-anchor="middle" font-size="10" fill="#555">prévisualisation tags</text>

  <!-- Conversions avant -->
  <text x="26" y="452" font-size="10" font-weight="700" fill="#888" letter-spacing="0.8">CONVERSIONS (dispersées dans le code)</text>
  <line x1="26" y1="456" x2="428" y2="456" stroke="#DDD" stroke-width="1"/>

  <rect x="18" y="463" width="410" height="90" rx="5" fill="#FFF3E0" stroke="#FFAB91" stroke-width="1.5"/>
  <text x="26" y="479" font-size="10" fill="#E65100">TagFilter.onComboUpdate() :  strings → tagObjs  (combobox)</text>
  <text x="26" y="494" font-size="10" fill="#E65100">EditTagsDialog.initStagingTags() :  API strings → strings  (identité)</text>
  <text x="26" y="509" font-size="10" fill="#E65100">EditTagsDialog.flattenTags() :  strings → API strings  (identité)</text>
  <text x="26" y="524" font-size="10" fill="#E65100">TagPhotos.genSelectedPhotos() :  photo.tags strings → strings</text>
  <text x="26" y="539" font-size="10" fill="#888">→ conversions ad hoc, pas de logique centralisée</text>

  <!-- Problèmes -->
  <text x="26" y="574" font-size="10" font-weight="700" fill="#888" letter-spacing="0.8">PROBLÈMES</text>
  <line x1="26" y1="578" x2="428" y2="578" stroke="#DDD" stroke-width="1"/>
  <text x="26" y="594" font-size="10" fill="#C62828">✗  Rendu dupliqué (chips + combobox)</text>
  <text x="26" y="610" font-size="10" fill="#C62828">✗  Formats incompatibles objets ≠ strings</text>
  <text x="26" y="626" font-size="10" fill="#C62828">✗  isMobile à gérer deux fois</text>
  <text x="26" y="642" font-size="10" fill="#C62828">✗  Couleurs indisponibles dans résumé FilterBar</text>
  <text x="26" y="658" font-size="10" fill="#C62828">✗  ViewDetail a son propre filtre non unifié</text>
  <text x="26" y="674" font-size="10" fill="#C62828">✗  disabled/readonly impossible sans surcharge</text>

  <!-- ══════════ RIGHT: APRÈS ══════════ -->
  <rect x="458" y="52" width="934" height="718" rx="10" fill="#F1F8E9" stroke="#A5D6A7" stroke-width="2"/>
  <text x="925" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32" letter-spacing="1">APRÈS  (1 composant)</text>

  <!-- TagGroupsWidget — le seul composant -->
  <rect x="580" y="84" width="690" height="208" rx="10" fill="#A5D6A7" stroke="#2E7D32" stroke-width="3"/>
  <text x="925" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#1B5E20">TagGroupsWidget.vue</text>
  <text x="925" y="124" text-anchor="middle" font-size="11" fill="#1B5E20">Remplace TagFilter + TagGroupsEditor — rendu unique, format unifié</text>
  <line x1="596" y1="132" x2="1254" y2="132" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <text x="596" y="150" font-size="10" font-weight="700" fill="#1B5E20">PROPS</text>
  <text x="596" y="165" font-size="10" fill="#1B5E20">tagGroups[]          liste complète des groupes depuis /api/tags</text>
  <text x="596" y="179" font-size="10" fill="#1B5E20">modelValue           { group: [tagObj, ...] }  —  format unifié objets partout</text>
  <text x="596" y="193" font-size="10" fill="#1B5E20">photos[]             optionnel — si fourni : filtre les tags visibles aux tags présents sur ces photos</text>
  <text x="596" y="207" font-size="10" fill="#1B5E20">showAll              si true : ignore photos, affiche tous les tags (mode création de vue)</text>
  <text x="596" y="221" font-size="10" fill="#1B5E20">isMobile             chips horizontal x-small sur mobile, vertical default sur desktop</text>
  <text x="596" y="235" font-size="10" fill="#1B5E20">disabled             chips non cliquables — lecture seule (Admin preview)</text>

  <line x1="596" y1="242" x2="1254" y2="242" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>
  <text x="596" y="257" font-size="10" font-weight="700" fill="#1B5E20">COMPORTEMENT</text>
  <text x="596" y="271" font-size="10" fill="#1B5E20">computed filteredTagGroups :  photos fourni &amp;&amp; !showAll  →  filtre   |   sinon  →  tagGroups complet</text>
  <text x="596" y="285" font-size="10" fill="#1B5E20">rendu :  v-chip-group (:value="tag", return-object) + v-combobox   ·   émet update:modelValue [tagObj]</text>

  <!-- Consommateurs après -->
  <text x="474" y="318" font-size="10" font-weight="700" fill="#888" letter-spacing="0.8">CONSOMMATEURS — USAGE DIRECT</text>
  <line x1="474" y1="322" x2="1382" y2="322" stroke="#DDD" stroke-width="1"/>

  <!-- FilterBar -->
  <rect x="474" y="330" width="210" height="100" rx="6" fill="white" stroke="#F9A825" stroke-width="2"/>
  <text x="579" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">FilterBar.vue</text>
  <line x1="490" y1="354" x2="668" y2="354" stroke="#F9A825" stroke-width="1" opacity="0.5"/>
  <text x="579" y="369" text-anchor="middle" font-size="10" fill="#555">:photos="photos"</text>
  <text x="579" y="383" text-anchor="middle" font-size="10" fill="#555">:show-all="showAllTags"</text>
  <text x="579" y="397" text-anchor="middle" font-size="10" fill="#555">:is-mobile="isMobile"</text>
  <text x="579" y="414" text-anchor="middle" font-size="10" fill="#388E3C">Photos, ViewCreate, ViewDetail</text>

  <!-- TagPhotos -->
  <rect x="700" y="330" width="210" height="100" rx="6" fill="white" stroke="#E65100" stroke-width="2"/>
  <text x="805" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#BF360C">TagPhotos.vue</text>
  <line x1="716" y1="354" x2="894" y2="354" stroke="#E65100" stroke-width="1" opacity="0.5"/>
  <text x="805" y="369" text-anchor="middle" font-size="10" fill="#555">(sans photos)</text>
  <text x="805" y="383" text-anchor="middle" font-size="10" fill="#555">tous les tags DB</text>
  <text x="805" y="397" text-anchor="middle" font-size="10" fill="#555">:is-mobile="isMobile"</text>
  <text x="805" y="414" text-anchor="middle" font-size="10" fill="#388E3C">Photos, Unpub, ViewCreate</text>

  <!-- EditTagsDialog -->
  <rect x="926" y="330" width="210" height="100" rx="6" fill="white" stroke="#E65100" stroke-width="2"/>
  <text x="1031" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#BF360C">EditTagsDialog.vue</text>
  <line x1="942" y1="354" x2="1120" y2="354" stroke="#E65100" stroke-width="1" opacity="0.5"/>
  <text x="1031" y="369" text-anchor="middle" font-size="10" fill="#555">(sans photos)</text>
  <text x="1031" y="383" text-anchor="middle" font-size="10" fill="#555">tous les tags DB</text>
  <text x="1031" y="414" text-anchor="middle" font-size="10" fill="#388E3C">depuis PhotoDetailPanel</text>

  <!-- Admin -->
  <rect x="1152" y="330" width="210" height="100" rx="6" fill="white" stroke="#303F9F" stroke-width="2"/>
  <text x="1257" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#1A237E">Admin.vue</text>
  <line x1="1168" y1="354" x2="1346" y2="354" stroke="#303F9F" stroke-width="1" opacity="0.5"/>
  <text x="1257" y="369" text-anchor="middle" font-size="10" fill="#555">:disabled="true"</text>
  <text x="1257" y="383" text-anchor="middle" font-size="10" fill="#555">lecture seule</text>
  <text x="1257" y="397" text-anchor="middle" font-size="10" fill="#555">tous les tags DB</text>
  <text x="1257" y="414" text-anchor="middle" font-size="10" fill="#388E3C">prévisualisation YAML</text>

  <!-- Arrows from widget to consumers -->
  <line x1="768" y1="292" x2="579" y2="330" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#ar-green)"/>
  <line x1="880" y1="292" x2="805" y2="330" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#ar-green)"/>
  <line x1="990" y1="292" x2="1031" y2="330" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#ar-green)"/>
  <line x1="1100" y1="292" x2="1257" y2="330" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#ar-green)"/>

  <!-- Frontières API -->
  <text x="474" y="454" font-size="10" font-weight="700" fill="#888" letter-spacing="0.8">CONVERSIONS — AUX FRONTIÈRES API UNIQUEMENT</text>
  <line x1="474" y1="458" x2="1382" y2="458" stroke="#DDD" stroke-width="1"/>

  <rect x="474" y="465" width="430" height="74" rx="6" fill="white" stroke="#81C784" stroke-width="1.5"/>
  <text x="689" y="483" text-anchor="middle" font-size="11" font-weight="600" fill="#1B5E20">Chargement  (API strings → objets)</text>
  <text x="689" y="498" text-anchor="middle" font-size="10" fill="#555">TagPhotos.genSelectedPhotos()  +  EditTagsDialog.initStagingTags()</text>
  <text x="689" y="512" text-anchor="middle" font-size="10" fill="#555">photo.tags { group: [name] }  →  { group: [tagObj] }</text>
  <text x="689" y="526" text-anchor="middle" font-size="10" fill="#888">lookup: tagGroups.find(t ⇒ t.name === name)</text>

  <rect x="922" y="465" width="440" height="74" rx="6" fill="white" stroke="#81C784" stroke-width="1.5"/>
  <text x="1142" y="483" text-anchor="middle" font-size="11" font-weight="600" fill="#1B5E20">Sauvegarde  (objets → API strings)</text>
  <text x="1142" y="498" text-anchor="middle" font-size="10" fill="#555">TagPhotos.doApplyTags()  +  EditTagsDialog.doApplyTags()</text>
  <text x="1142" y="512" text-anchor="middle" font-size="10" fill="#555">{ group: [tagObj] }  →  { group: [tag.name] }</text>
  <text x="1142" y="526" text-anchor="middle" font-size="10" fill="#888">flattenTags(): entries().map(t ⇒ t.name)</text>

  <!-- Bénéfices -->
  <rect x="474" y="558" width="880" height="100" rx="6" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="914" y="577" text-anchor="middle" font-size="11" font-weight="700" fill="#1B5E20">✓  Bénéfices</text>
  <text x="490" y="594" font-size="10" fill="#2E7D32">•  3 composants  →  1 composant  (TagFilter + TagGroupsEditor supprimés)</text>
  <text x="490" y="610" font-size="10" fill="#2E7D32">•  Format unifié objets partout  —  couleurs disponibles nativement dans FilterBar résumé et partout</text>
  <text x="490" y="626" font-size="10" fill="#2E7D32">•  isMobile géré une seule fois  ·  disabled natif pour Admin  ·  photos optionnel = filtre ou édition</text>
  <text x="490" y="642" font-size="10" fill="#2E7D32">•  Conversions strings ↔ objets explicites et centralisées uniquement aux appels API</text>
  <text x="490" y="658" font-size="10" fill="#2E7D32">•  ViewDetail peut rejoindre FilterBar sans régression  (même composant, même comportement)</text>

  <!-- Files to delete -->
  <rect x="474" y="672" width="880" height="48" rx="6" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="1.5"/>
  <text x="914" y="690" text-anchor="middle" font-size="10" font-weight="700" fill="#C62828">Fichiers supprimés</text>
  <text x="914" y="706" text-anchor="middle" font-size="10" fill="#C62828">TagFilter.vue   ·   TagGroupsEditor.vue     →   remplacés par TagGroupsWidget.vue</text>

  <!-- ══ SEPARATOR ══ -->
  <line x1="444" y1="60" x2="444" y2="762" stroke="#CCC" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="452" y="440" font-size="20" fill="#CCC" transform="rotate(-90 452 440)">→  refactoring</text>

</svg>
