services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    extends:
      file: docker-compose.yml
      service: db
    volumes:
      - "/tmp/data/db:/var/lib/mysql"
      - "./db-init:/docker-entrypoint-initdb.d"  # optional: init DB from SQL dump on first start

  # ── Web (Django + nginx) ────────────────────────────────────────────────────
  web:
    extends:
      file: docker-compose.yml
      service: web
    build: .
    environment:
      DEBUG: "true"       # disables CSRF middleware — DJANGO_URL not needed in dev
      LOG_LEVEL: "DEBUG"
      HEADER_ALLOW_ORIGIN: "*"
    volumes:
      - "./photohub:/photohub"      # live reload — Django source mounted directly
      - "/tmp/data/photos:/data"
      - "./dumps:/dumps"

  # ── Worker (video transcoding) ──────────────────────────────────────────────
  worker:
    extends:
      file: docker-compose.yml
      service: worker
    build: .
    volumes:
      - "./photohub:/photohub"
      - "/tmp/data/photos:/data"

  # ── Vue dev server (HMR) ────────────────────────────────────────────────────
  # Serves the Vue frontend with Vite HMR — no build step needed.
  # The nginx dev proxy (below) routes / to this container, including WebSocket
  # upgrade headers so Vite HMR live-reload works in the browser.
  # To upgrade Node: update the image tag here AND in the Dockerfile. See dev.md → Upgrading dependencies.
  web-vue:
    image: node:lts-alpine3.21
    ports:
      - "3000:3000"
    command: sh -c "cd /photohub-vuetify-src/ && yarn dev --host"
    volumes:
      - "./photohub-vuetify-src/:/photohub-vuetify-src"
    network_mode: bridge

  # ── nginx dev proxy ─────────────────────────────────────────────────────────
  # Listens on :8080 and splits traffic:
  #   /           → web-vue:3000  (Vite HMR, with WebSocket upgrade headers)
  #   /api|static → web:80        (Django API + media files)
  # This mirrors the prod routing — the frontend behaves identically in dev.
  # Template: dev/nginx-template/default.conf.template
  # See dev.md for the full dev stack architecture diagram.
  nginx:
    image: nginx
    links: [web, web-vue]
    depends_on:
      - web
      - web-vue
    ports:
      - "8080:8080"
    volumes:
      - ./dev/nginx-template/:/etc/nginx/templates
    environment:
      NGINX_MAX_UPLOAD_SIZE: "10240m"
    command: [nginx-debug, '-g', 'daemon off;']
    network_mode: bridge
